<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyVault — Resource Organizer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0c10;--surface:#13141a;--surface2:#1c1d26;--surface3:#23242f;
  --border:#2e2f3e;--text:#e8e9f4;--muted:#7a7b95;
  --accent:#7c6af7;--accent-rgb:124,106,247;--accent2:#f7a26a;--accent3:#6af7c8;
  --danger:#f76a7a;--star:#f7d96a;--radius:14px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;min-height:100vh;overflow-x:hidden;transition:background .6s,color .6s;}

/* BG */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.11;animation:orbF 18s ease-in-out infinite alternate;}
.bg-orb:nth-child(1){width:500px;height:500px;top:-100px;left:-100px;background:var(--accent);animation-delay:0s;}
.bg-orb:nth-child(2){width:350px;height:350px;bottom:-80px;right:-80px;background:var(--accent3);animation-delay:-6s;}
.bg-orb:nth-child(3){width:280px;height:280px;top:40%;left:55%;background:var(--accent2);animation-delay:-12s;}
@keyframes orbF{from{transform:translate(0,0) scale(1);}to{transform:translate(40px,30px) scale(1.08);}}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(var(--accent-rgb),.032) 1px,transparent 1px),linear-gradient(90deg,rgba(var(--accent-rgb),.032) 1px,transparent 1px);
  background-size:48px 48px;}

/* HEADER */
header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:15px 36px;
  background:rgba(11,12,16,.78);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px;}
.logo em{color:var(--accent);font-style:normal;}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.theme-pill{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);letter-spacing:1px;
  background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;}
.theme-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
.hstats{display:flex;gap:22px;}
.stat .sn{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--accent);line-height:1;}
.stat .sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

/* LAYOUT */
.wrap{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:30px 36px;}
.sh{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.sh::after{content:'';flex:1;height:1px;background:var(--border);}

/* ADD PANEL */
.add-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:26px;margin-bottom:26px;position:relative;overflow:hidden;}
.add-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.fg{display:grid;grid-template-columns:2fr 2fr 1.2fr 1.2fr auto;gap:10px;align-items:end;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.f{display:flex;flex-direction:column;gap:5px;}
.f label{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.f input,.f select{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;}
.f input:focus,.f select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.12);}
.f select option{background:var(--surface2);}
.btn-add{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:9px 22px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;height:39px;align-self:end;transition:all .18s;box-shadow:0 4px 16px rgba(var(--accent-rgb),.25);}
.btn-add:hover{filter:brightness(1.12);transform:translateY(-1px);}

/* CONTROLS */
.ctrl{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
.sbox{flex:1;min-width:210px;position:relative;}
.sbox input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 36px 9px 38px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;}
.sbox input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.1);}
.sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;}
.sclr{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;display:none;}
.sclr.vis{display:block;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;cursor:pointer;transition:all .15s;color:var(--muted);font-family:'DM Mono',monospace;}
.chip:hover{border-color:var(--accent);color:var(--text);}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.chip.sc.active{background:var(--star);border-color:var(--star);color:#000;}
.ssort{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 11px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;cursor:pointer;}
.ssort:focus{border-color:var(--accent);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(308px,1fr));gap:13px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:17px 19px;position:relative;transition:transform .2s,box-shadow .2s,border-color .2s;animation:cIn .28s ease forwards;overflow:hidden;}
@keyframes cIn{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--cat-clr,var(--accent));opacity:0;transition:opacity .2s;}
.card:hover{transform:translateY(-3px);box-shadow:0 14px 38px rgba(0,0,0,.32);border-color:rgba(var(--accent-rgb),.38);}
.card:hover::before{opacity:1;}
.card.starred{border-color:rgba(247,217,106,.33);}
.card.starred::before{background:var(--star);opacity:1;}

.ch{display:flex;align-items:flex-start;gap:10px;margin-bottom:7px;}
.fav{width:22px;height:22px;border-radius:5px;background:var(--surface2);flex-shrink:0;margin-top:2px;border:1px solid var(--border);}
.ctw{flex:1;min-width:0;}

/* editable fields */
.ctitle{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;line-height:1.3;word-break:break-word;outline:none;border-radius:4px;padding:1px 3px;margin:-1px -3px;transition:background .15s;}
.ctitle[contenteditable="true"]{background:var(--surface3);box-shadow:0 0 0 2px var(--accent);cursor:text;}
.ctitle[contenteditable="true"]:empty::before{content:'Title...';color:var(--muted);}
.curl{font-size:11px;color:var(--accent);text-decoration:none;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;outline:none;border-radius:3px;padding:0 3px;margin-left:-3px;transition:background .15s;}
.curl[contenteditable="true"]{background:var(--surface3);box-shadow:0 0 0 2px var(--accent3);color:var(--accent3);}
.curl:not([contenteditable="true"]):hover{text-decoration:underline;}
.cbadge{display:inline-flex;align-items:center;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:7px;}
.cnotes{font-size:12px;color:var(--muted);margin-top:7px;line-height:1.5;outline:none;border-radius:6px;padding:4px 7px;margin-left:-7px;min-height:16px;word-break:break-word;transition:background .15s;}
.cnotes[contenteditable="true"]{background:var(--surface3);box-shadow:0 0 0 2px rgba(var(--accent-rgb),.3);color:var(--text);}
.cnotes:empty::before{content:'Add notes...';color:var(--border);}
.tw{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px;}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(var(--accent-rgb),.1);color:var(--accent);border:1px solid rgba(var(--accent-rgb),.2);cursor:pointer;transition:all .15s;}
.tag:hover{background:rgba(var(--accent-rgb),.22);}
.tiw{margin-top:6px;display:none;}
.tiw.op{display:block;}
.ti{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:7px;padding:4px 9px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;outline:none;}
.ti:focus{border-color:var(--accent3);}
.cf{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:10px;border-top:1px solid var(--border);}
.cd{font-size:10px;color:var(--muted);}
.ca{display:flex;gap:5px;}
.ib{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;}
.ib:hover{border-color:var(--accent);color:var(--text);}
.ib.stb.on{color:var(--star);border-color:var(--star);background:rgba(247,217,106,.1);}
.ib.edb.on{color:var(--accent3);border-color:var(--accent3);background:rgba(106,247,200,.08);}
.ib.dlb:hover{color:var(--danger);border-color:var(--danger);}
.ib.opb:hover{color:var(--accent2);border-color:var(--accent2);}

/* FAV PREVIEW */
.fp-row{display:flex;align-items:flex-end;gap:10px;}
#fav-preview{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);display:none;background:var(--surface2);}
.fp-text{font-size:11px;color:var(--muted);padding:9px 12px;background:var(--surface2);border:1px dashed var(--border);border-radius:9px;flex:1;}

/* AUTOSAVE */
.sf{position:fixed;bottom:22px;right:22px;z-index:999;background:var(--surface2);border:1px solid var(--accent3);color:var(--accent3);border-radius:10px;padding:9px 17px;font-size:12px;opacity:0;transform:translateY(12px);transition:all .25s;pointer-events:none;}
.sf.show{opacity:1;transform:translateY(0);}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted);}
.empty .ei{font-size:52px;margin-bottom:16px;}
.empty h3{font-family:'Syne',sans-serif;font-size:20px;color:var(--text);margin-bottom:7px;}

/* CAT COLOURS */
.cat-Math       {--cat-clr:#f7a26a;background:rgba(247,162,106,.12);color:#f7a26a;}
.cat-Science    {--cat-clr:#6af7c8;background:rgba(106,247,200,.12);color:#6af7c8;}
.cat-Programming{--cat-clr:#7c6af7;background:rgba(124,106,247,.15);color:#a597fb;}
.cat-English    {--cat-clr:#f76a7a;background:rgba(247,106,122,.12);color:#f76a7a;}
.cat-History    {--cat-clr:#f7d96a;background:rgba(247,217,106,.12);color:#c9a83a;}
.cat-Geography  {--cat-clr:#6ab4f7;background:rgba(106,180,247,.12);color:#6ab4f7;}
.cat-Physics    {--cat-clr:#d06af7;background:rgba(208,106,247,.12);color:#d06af7;}
.cat-Chemistry  {--cat-clr:#6af777;background:rgba(106,247,119,.12);color:#4cc45b;}
.cat-Biology    {--cat-clr:#f7c36a;background:rgba(247,195,106,.12);color:#d4973c;}
.cat-Other      {--cat-clr:#7a7b95;background:rgba(122,123,149,.12);color:#9a9bb5;}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-size:13px;z-index:999;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

@media(max-width:900px){
  header{padding:13px 18px;}
  .wrap{padding:18px;}
  .fg{grid-template-columns:1fr 1fr;}
  .fg .btn-add{grid-column:1/-1;height:auto;padding:11px;}
  .hstats{display:none;}
}
@media(max-width:520px){
  .fg{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="bg-canvas"><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div></div>
<div class="bg-grid"></div>

<header>
  <div>
    <div class="logo">Study<em>Vault</em></div>
    <div class="logo-sub">FastWeb · Resource Hub</div>
  </div>
  <div class="theme-pill"><div class="theme-dot"></div><span id="tname">—</span></div>
  <div class="hstats">
    <div class="stat"><div class="sn" id="st-t">0</div><div class="sl">Resources</div></div>
    <div class="stat"><div class="sn" id="st-s">0</div><div class="sl">Starred</div></div>
    <div class="stat"><div class="sn" id="st-c">0</div><div class="sl">Categories</div></div>
  </div>
</header>

<div class="wrap">

  <div class="sh">// Add New Resource</div>
  <div class="add-panel">
    <div class="fg">
      <div class="f"><label>Title</label><input type="text" id="fi-t" placeholder="e.g. Khan Academy – Algebra"></div>
      <div class="f"><label>URL</label><input type="url" id="fi-u" placeholder="https://..." oninput="prevFav()"></div>
      <div class="f"><label>Category</label>
        <select id="fi-c">
          <option>Math</option><option>Science</option><option>Physics</option>
          <option>Chemistry</option><option>Biology</option><option>Programming</option>
          <option>English</option><option>History</option><option>Geography</option><option>Other</option>
        </select>
      </div>
      <div class="f"><label>Tags <small style="color:var(--border)">(comma)</small></label><input type="text" id="fi-g" placeholder="video, free, beginner"></div>
      <button class="btn-add" onclick="addRes()">＋ Add</button>
    </div>
    <div class="fg2" style="margin-top:10px;">
      <div class="f"><label>Notes</label><input type="text" id="fi-n" placeholder="Quick note about this resource..."></div>
      <div class="fp-row">
        <img id="fav-preview" src="" alt="">
        <div class="fp-text" id="fp-txt">Enter a URL to preview its favicon</div>
      </div>
    </div>
  </div>

  <div class="ctrl">
    <div class="sbox">
      <span class="sico">⌕</span>
      <input type="text" id="si" placeholder="Search title, URL, tag, notes, category…" oninput="onSrch(this)">
      <button class="sclr" id="sclr" onclick="clrSrch()">✕</button>
    </div>
    <select class="ssort" id="ssrt" onchange="render()">
      <option value="new">Newest first</option>
      <option value="old">Oldest first</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
    </select>
    <div class="chips" id="chips"></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="sf" id="sf">✓ Saved automatically</div>
<div class="toast" id="toast"></div>

<script>
/* ── THEMES ── */
const THEMES=[
  {name:'Violet Night',   bg:'#0b0c10',s:'#13141a',s2:'#1c1d26',s3:'#23242f',b:'#2e2f3e',t:'#e8e9f4',m:'#7a7b95',a:'#7c6af7',ar:'124,106,247',a2:'#f7a26a',a3:'#6af7c8'},
  {name:'Ocean Depth',    bg:'#070e14',s:'#0d1a24',s2:'#142333',s3:'#1c2e3f',b:'#1e3a50',t:'#d6eaf8',m:'#5a8099',a:'#38bdf8',ar:'56,189,248',a2:'#fb923c',a3:'#34d399'},
  {name:'Forest Ember',   bg:'#080c08',s:'#0f1810',s2:'#172318',s3:'#1f2e20',b:'#2a3d2b',t:'#d4e8d4',m:'#5c7a5d',a:'#4ade80',ar:'74,222,128',a2:'#fb923c',a3:'#fbbf24'},
  {name:'Rose Quartz',    bg:'#0f0a0c',s:'#1a1013',s2:'#241519',s3:'#2e1b20',b:'#3d2229',t:'#f0d8dc',m:'#8f5a62',a:'#fb7185',ar:'251,113,133',a2:'#c084fc',a3:'#fbbf24'},
  {name:'Amber Dusk',     bg:'#0c0a05',s:'#181408',s2:'#231d0d',s3:'#2e2612',b:'#3d3318',t:'#f0e8d0',m:'#8a7a4a',a:'#fbbf24',ar:'251,191,36',a2:'#f87171',a3:'#34d399'},
  {name:'Cyber Mint',     bg:'#040f0e',s:'#081a18',s2:'#0d2622',s3:'#12332e',b:'#184038',t:'#ccfaf4',m:'#4a7a72',a:'#2dd4bf',ar:'45,212,191',a2:'#818cf8',a3:'#f472b6'},
  {name:'Nebula Purple',  bg:'#09070f',s:'#110d1a',s2:'#181326',s3:'#201a30',b:'#2d2444',t:'#e8d8f8',m:'#7055a0',a:'#a78bfa',ar:'167,139,250',a2:'#f472b6',a3:'#67e8f9'},
  {name:'Sunrise Orange', bg:'#0f0906',s:'#1a100a',s2:'#25160e',s3:'#301c13',b:'#40261c',t:'#fce8dc',m:'#8c5a45',a:'#f97316',ar:'249,115,22',a2:'#facc15',a3:'#4ade80'},
  {name:'Steel Blue',     bg:'#080c12',s:'#0e1520',s2:'#152030',s3:'#1c2b3f',b:'#243553',t:'#d8e8f8',m:'#5a7090',a:'#60a5fa',ar:'96,165,250',a2:'#f472b6',a3:'#34d399'},
  {name:'Crimson Dark',   bg:'#0e0608',s:'#1a0c10',s2:'#251218',s3:'#311820',b:'#442030',t:'#f8d8dc',m:'#8c4a55',a:'#f43f5e',ar:'244,63,94',a2:'#fb923c',a3:'#4ade80'},
];
function applyTheme(th){
  const r=document.documentElement.style;
  r.setProperty('--bg',th.bg);r.setProperty('--surface',th.s);r.setProperty('--surface2',th.s2);
  r.setProperty('--surface3',th.s3);r.setProperty('--border',th.b);r.setProperty('--text',th.t);
  r.setProperty('--muted',th.m);r.setProperty('--accent',th.a);r.setProperty('--accent-rgb',th.ar);
  r.setProperty('--accent2',th.a2);r.setProperty('--accent3',th.a3);
  document.getElementById('tname').textContent=th.name;
  document.querySelector('.theme-dot').style.background=th.a;
  document.querySelector('.theme-dot').style.boxShadow='0 0 8px '+th.a;
}
const pickedTheme=THEMES[Math.floor(Math.random()*THEMES.length)];
applyTheme(pickedTheme);

/* ── SEED DATA ── */
const SEED=[
  // MATH
  {id:1,title:'Khan Academy – Math',url:'https://khanacademy.org/math',category:'Math',tags:['free','video','all-levels'],notes:'Full K-12 curriculum',starred:true,date:'2025-01-01'},
  {id:2,title:'Desmos Graphing Calculator',url:'https://desmos.com/calculator',category:'Math',tags:['tool','graphing','interactive'],notes:'Plot any function instantly',starred:false,date:'2025-01-02'},
  {id:3,title:'Wolfram Alpha',url:'https://wolframalpha.com',category:'Math',tags:['solver','step-by-step'],notes:'Get worked solutions',starred:true,date:'2025-01-03'},
  {id:4,title:"Paul's Online Math Notes",url:'https://tutorial.math.lamar.edu',category:'Math',tags:['calculus','algebra','notes'],notes:'Excellent for Calculus I–III',starred:false,date:'2025-01-04'},
  {id:5,title:'MIT OCW – Single Variable Calculus',url:'https://ocw.mit.edu/courses/18-01sc-single-variable-calculus-fall-2010',category:'Math',tags:['MIT','calculus','advanced'],notes:'Free MIT lecture notes & problem sets',starred:false,date:'2025-01-05'},
  {id:6,title:'Art of Problem Solving',url:'https://artofproblemsolving.com',category:'Math',tags:['olympiad','competition','challenging'],notes:'Olympiad & competition math',starred:false,date:'2025-01-06'},
  // SCIENCE
  {id:7,title:'PhET Interactive Simulations',url:'https://phet.colorado.edu',category:'Science',tags:['simulation','free','interactive'],notes:'Physics, chemistry & bio sims',starred:true,date:'2025-01-07'},
  {id:8,title:'Crash Course – Science',url:'https://youtube.com/@crashcourse',category:'Science',tags:['youtube','video','quick'],notes:'Engaging overview of all sciences',starred:false,date:'2025-01-08'},
  {id:9,title:'Science Daily',url:'https://sciencedaily.com',category:'Science',tags:['news','research','current'],notes:'Latest science research news',starred:false,date:'2025-01-09'},

/* ── STATE ── */
const KEY='studyvault_v3';
let res=[], activeF='All', saveTimer=null;

function loadData(){
  try{ res=JSON.parse(localStorage.getItem(KEY)||'null')||[...SEED]; }
  catch{ res=[...SEED]; }
}
function saveData(silent=false){
  localStorage.setItem(KEY,JSON.stringify(res));
  if(!silent) flashSave();
}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveData(),600);}
function flashSave(){
  const el=document.getElementById('sf');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),1800);
}

/* ── CHIPS ── */
const CATS=['Math','Science','Physics','Chemistry','Biology','Programming','English','History','Geography','Other'];
function buildChips(){
  document.getElementById('chips').innerHTML=
    ['All',...CATS,'★ Starred'].map(c=>`
      <span class="chip ${c===activeF?'active':''} ${c==='★ Starred'?'sc':''}"
        onclick="setF('${c}',this)">${c}</span>`).join('');
}
function setF(v,el){
  activeF=v;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  render();
}

/* ── SEARCH ── */
function onSrch(inp){
  document.getElementById('sclr').classList.toggle('vis',inp.value.length>0);
  render();
}
function clrSrch(){
  document.getElementById('si').value='';
  document.getElementById('sclr').classList.remove('vis');
  render();
}

/* ── FAVICON PREVIEW (form) ── */
function prevFav(){
  const url=document.getElementById('fi-u').value.trim();
  const img=document.getElementById('fav-preview');
  const txt=document.getElementById('fp-txt');
  if(!url){img.style.display='none';txt.textContent='Enter a URL to preview its favicon';return;}
  try{
    const h=new URL(url).hostname;
    img.src=`https://www.google.com/s2/favicons?sz=64&domain=${h}`;
    img.style.display='block';
    img.onerror=()=>{img.style.display='none';};
    txt.textContent=h;
  }catch{img.style.display='none';txt.textContent='Invalid URL';}
}
function getFav(url){
  try{return`https://www.google.com/s2/favicons?sz=32&domain=${new URL(url).hostname}`;}catch{return'';}
}

/* ── ADD ── */
function addRes(){
  const t=document.getElementById('fi-t').value.trim();
  const u=document.getElementById('fi-u').value.trim();
  const c=document.getElementById('fi-c').value;
  const g=document.getElementById('fi-g').value.split(',').map(x=>x.trim()).filter(Boolean);
  const n=document.getElementById('fi-n').value.trim();
  if(!t||!u){showToast('⚠ Title and URL required');return;}
  res.unshift({id:Date.now(),title:t,url:u,category:c,tags:g,notes:n,starred:false,date:new Date().toISOString().slice(0,10)});
  saveData();render();
  ['fi-t','fi-u','fi-g','fi-n'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fav-preview').style.display='none';
  document.getElementById('fp-txt').textContent='Enter a URL to preview its favicon';
  showToast('✓ Resource added!');
}

/* ── STAR / DELETE ── */
function toggleStar(id){
  const r=res.find(x=>x.id===id);
  if(r){r.starred=!r.starred;saveData();render();}
}
function delRes(id){
  if(!confirm('Delete this resource?'))return;
  res=res.filter(x=>x.id!==id);saveData();render();showToast('Deleted');
}

/* ── INLINE EDIT ── */
function toggleEdit(id){
  const card=document.querySelector(`[data-id="${id}"]`);
  if(!card)return;
  if(card.dataset.editing==='true'){commitEdit(id,card);}
  else{
    card.dataset.editing='true';
    card.querySelector('.ctitle').contentEditable='true';
    card.querySelector('.curl').contentEditable='true';
    card.querySelector('.cnotes').contentEditable='true';
    card.querySelector('.tiw').classList.add('op');
    card.querySelector('.edb').classList.add('on');
    card.querySelector('.ctitle').focus();
  }
}
function commitEdit(id,card){
  const r=res.find(x=>x.id===id);
  if(!r)return;
  r.title=card.querySelector('.ctitle').innerText.trim()||r.title;
  r.url  =card.querySelector('.curl').innerText.trim()||r.url;
  r.notes=card.querySelector('.cnotes').innerText.trim();
  const tv=card.querySelector('.ti').value.trim();
  if(tv){r.tags=[...new Set([...r.tags,...tv.split(',').map(x=>x.trim()).filter(Boolean)])];}
  card.dataset.editing='false';
  ['ctitle','curl','cnotes'].forEach(cls=>{card.querySelector('.'+cls).contentEditable='false';});
  card.querySelector('.tiw').classList.remove('op');
  card.querySelector('.ti').value='';
  card.querySelector('.edb').classList.remove('on');
  saveData();showToast('✓ Changes saved');render();
}
function removeTag(id,i){
  const r=res.find(x=>x.id===id);
  if(r){r.tags.splice(i,1);saveData();render();}
}
function tagKey(e,id){
  if(e.key==='Enter'){
    const tags=e.target.value.split(',').map(x=>x.trim()).filter(Boolean);
    const r=res.find(x=>x.id===id);
    if(r&&tags.length){r.tags=[...new Set([...r.tags,...tags])];e.target.value='';saveData();render();showToast('Tags added ✓');}
  }
}

/* ── RENDER ── */
function render(){
  const q=(document.getElementById('si').value||'').toLowerCase();
  const srt=document.getElementById('ssrt').value;
  let list=res.filter(r=>{
    if(activeF==='★ Starred'&&!r.starred)return false;
    if(activeF!=='All'&&activeF!=='★ Starred'&&r.category!==activeF)return false;
    if(q)return[r.title,r.url,r.notes||'',r.category,...r.tags].some(s=>s.toLowerCase().includes(q));
    return true;
  });
  list=[...list].sort((a,b)=>srt==='new'?b.id-a.id:srt==='old'?a.id-b.id:srt==='az'?a.title.localeCompare(b.title):b.title.localeCompare(a.title));
  const g=document.getElementById('grid');
  g.innerHTML=list.length
    ?list.map(cardHTML).join('')
    :`<div class="empty"><div class="ei">📚</div><h3>Nothing here</h3><p>Add a resource or try a different filter.</p></div>`;
  document.getElementById('st-t').textContent=res.length;
  document.getElementById('st-s').textContent=res.filter(r=>r.starred).length;
  document.getElementById('st-c').textContent=[...new Set(res.map(r=>r.category))].length;
}

function cardHTML(r){
  const fav=getFav(r.url);
  const dateStr=r.date?new Date(r.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'';
  const tagsHTML=r.tags.map((t,i)=>`<span class="tag" onclick="removeTag(${r.id},${i})" title="Click to remove">#${esc(t)}</span>`).join('');
  return`<div class="card ${r.starred?'starred':''}" data-id="${r.id}" data-editing="false">
    <div class="ch">
      <img class="fav" src="${fav}" alt="" onerror="this.style.visibility='hidden'">
      <div class="ctw">
        <div class="ctitle" contenteditable="false" spellcheck="false">${esc(r.title)}</div>
        <a class="curl" href="${esc(r.url)}" target="_blank" rel="noopener" contenteditable="false" spellcheck="false" onclick="handleA(event,this)">${esc(r.url)}</a>
      </div>
    </div>
    <span class="cbadge cat-${r.category}">${r.category}</span>
    <div class="cnotes" contenteditable="false">${esc(r.notes||'')}</div>
    <div class="tw">${tagsHTML}</div>
    <div class="tiw"><input class="ti" type="text" placeholder="+ add tags (comma-sep), Enter to save" onkeydown="tagKey(event,${r.id})"></div>
    <div class="cf">
      <span class="cd">${dateStr}</span>
      <div class="ca">
        <div class="ib stb ${r.starred?'on':''}" onclick="toggleStar(${r.id})" title="${r.starred?'Unstar':'Star'}">★</div>
        <div class="ib opb" onclick="window.open('${esc(r.url)}','_blank')" title="Open">↗</div>
        <div class="ib edb" onclick="toggleEdit(${r.id})" title="Edit / Save">✎</div>
        <div class="ib dlb" onclick="delRes(${r.id})" title="Delete">✕</div>
      </div>
    </div>
  </div>`;
}

function handleA(e,el){if(el.closest('.card').dataset.editing==='true')e.preventDefault();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.activeElement.closest('.add-panel')&&document.activeElement.tagName==='INPUT')addRes();
});

loadData();buildChips();render();
</script>
