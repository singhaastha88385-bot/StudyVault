<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizBlitz — Test Your Brain</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c3aed;
    --accent2: #f59e0b;
    --accent3: #10b981;
    --danger: #ef4444;
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --glow: rgba(124,58,237,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(245,158,11,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 24px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .screen.active { display: flex; }

  /* ───── HOME ───── */
  #home { gap: 40px; }
  .logo {
    font-size: clamp(40px, 8vw, 72px);
    font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: pulse-logo 3s ease-in-out infinite;
  }
  @keyframes pulse-logo {
    0%,100% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
  }
  .tagline {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 600px;
  }
  .cat-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .cat-card:hover, .cat-card.selected {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px var(--glow);
  }
  .cat-card.selected::after {
    content: '✓';
    position: absolute; top: 8px; right: 10px;
    color: var(--accent); font-size: 14px; font-weight: 700;
  }
  .cat-icon { font-size: 32px; display: block; margin-bottom: 8px; }
  .cat-name { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }

  .start-btn {
    background: linear-gradient(135deg, var(--accent), #9333ea);
    color: white;
    border: none;
    padding: 16px 48px;
    border-radius: 50px;
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s ease;
    box-shadow: 0 4px 20px var(--glow);
  }
  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px var(--glow);
  }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ───── QUIZ ───── */
  #quiz { gap: 0; justify-content: flex-start; padding-top: 40px; }
  .quiz-shell {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .q-counter {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .q-counter span { color: var(--text); font-weight: 600; }
  .cat-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .score-live {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent3);
    font-weight: 600;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .timer-ring-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .timer-ring-wrap svg { transform: rotate(-90deg); }
  .timer-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .timer-arc {
    fill: none;
    stroke: var(--accent3);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }
  .timer-num {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 15px;
    fill: var(--text);
    dominant-baseline: middle;
    text-anchor: middle;
  }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    position: relative;
    overflow: hidden;
    animation: slide-in 0.35s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slide-in {
    from { opacity:0; transform: translateX(30px); }
    to   { opacity:1; transform: translateX(0); }
  }
  .q-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .q-text {
    font-size: clamp(17px, 2.5vw, 22px);
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
  }

  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 520px) { .answers { grid-template-columns: 1fr; } }

  .ans-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    text-align: left;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .ans-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(124,58,237,0.1);
    transform: translateY(-1px);
  }
  .ans-btn:disabled { cursor: not-allowed; }
  .ans-btn.correct {
    border-color: var(--accent3);
    background: rgba(16,185,129,0.15);
    color: #6ee7b7;
  }
  .ans-btn.wrong {
    border-color: var(--danger);
    background: rgba(239,68,68,0.12);
    color: #fca5a5;
  }
  .ans-btn.reveal {
    border-color: var(--accent3);
    background: rgba(16,185,129,0.08);
  }
  .ans-label {
    width: 26px; height: 26px;
    border-radius: 8px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }
  .ans-btn.correct .ans-label { background: var(--accent3); color: #000; }
  .ans-btn.wrong .ans-label { background: var(--danger); color: #fff; }

  .feedback-bar {
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: fade-in 0.25s ease;
    display: none;
  }
  @keyframes fade-in { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .feedback-bar.correct { background: rgba(16,185,129,0.15); border: 1px solid var(--accent3); color: #6ee7b7; }
  .feedback-bar.wrong   { background: rgba(239,68,68,0.12);  border: 1px solid var(--danger);  color: #fca5a5; }

  .next-btn {
    align-self: flex-end;
    background: var(--card);
    border: 2px solid var(--accent);
    color: var(--text);
    padding: 12px 32px;
    border-radius: 50px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    transition: all 0.18s ease;
    letter-spacing: 0.5px;
  }
  .next-btn:hover { background: var(--accent); box-shadow: 0 4px 20px var(--glow); }

  /* ───── RESULTS ───── */
  #results { gap: 32px; }
  .result-shell {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    align-items: center;
  }
  .score-circle {
    width: 160px; height: 160px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 4px solid var(--accent);
    box-shadow: 0 0 40px var(--glow), inset 0 0 30px rgba(124,58,237,0.1);
    animation: circle-pop 0.5s cubic-bezier(.17,.67,.34,1.4);
  }
  @keyframes circle-pop {
    from { transform: scale(0.6); opacity:0; }
    to   { transform: scale(1);   opacity:1; }
  }
  .score-big {
    font-size: 52px;
    font-weight: 800;
    background: linear-gradient(135deg, #fff, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .score-denom { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .verdict {
    font-size: 26px;
    font-weight: 800;
    text-align: center;
    letter-spacing: -0.5px;
  }
  .verdict-sub { color: var(--muted); font-size: 14px; text-align: center; font-family: 'DM Mono', monospace; }

  .stats-row {
    display: flex;
    gap: 12px;
    width: 100%;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat-pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }
  .stat-pill strong { color: var(--accent2); }

  .breakdown {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 260px;
    overflow-y: auto;
  }
  .breakdown::-webkit-scrollbar { width: 4px; }
  .breakdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .bd-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px;
    border-radius: 10px;
    background: var(--surface);
    font-size: 13px;
    line-height: 1.4;
  }
  .bd-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .bd-q { color: var(--text); font-weight: 600; }
  .bd-a { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; margin-top: 2px; }

  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn-outline {
    background: transparent;
    border: 2px solid var(--border);
    color: var(--text);
    padding: 12px 28px;
    border-radius: 50px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-outline:hover { border-color: var(--accent); }
</style>
</head>
<body>

<!-- ── HOME SCREEN ── -->
<div class="screen active" id="home">
  <div class="logo">QuizBlitz⚡</div>
  <div class="tagline">// test your knowledge</div>

  <div class="category-grid" id="catGrid"></div>

  <button class="start-btn" id="startBtn" disabled onclick="startQuiz()">
    Pick a Category First
  </button>
</div>

<!-- ── QUIZ SCREEN ── -->
<div class="screen" id="quiz">
  <div class="quiz-shell">
    <div class="hud">
      <div class="q-counter">Q <span id="qIdx">1</span> / <span id="qTotal">10</span></div>
      <div class="cat-badge" id="catLabel">Science</div>
      <div class="score-live" id="livScore">⚡ 0 pts</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>

    <div class="timer-ring-wrap">
      <svg width="60" height="60" viewBox="0 0 60 60">
        <circle class="timer-bg" cx="30" cy="30" r="26"/>
        <circle class="timer-arc" id="timerArc" cx="30" cy="30" r="26"
          stroke-dasharray="163.4" stroke-dashoffset="0"/>
        <text class="timer-num" x="30" y="30" id="timerNum">15</text>
      </svg>
    </div>

    <div class="q-card">
      <div class="q-num" id="qNum">QUESTION 01</div>
      <div class="q-text" id="qText">Loading...</div>
    </div>

    <div class="answers" id="answers"></div>
    <div class="feedback-bar" id="feedbackBar"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
  </div>
</div>

<!-- ── RESULTS SCREEN ── -->
<div class="screen" id="results">
  <div class="result-shell">
    <div class="score-circle">
      <div class="score-big" id="finalScore">0</div>
      <div class="score-denom" id="finalDenom">/ 0</div>
    </div>
    <div>
      <div class="verdict" id="verdict">Nice work!</div>
      <div class="verdict-sub" id="verdictSub">Keep practising to improve.</div>
    </div>
    <div class="stats-row" id="statsRow"></div>
    <div class="breakdown" id="breakdown"></div>
    <div class="btn-row">
      <button class="start-btn" onclick="retryQuiz()">↺ Retry</button>
      <button class="btn-outline" onclick="goHome()">⌂ Home</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = {
  science: {
    label: '🔬 Science', color: '#10b981',
    qs: [
      { q: "What is the chemical symbol for Gold?", opts: ["Go","Gd","Au","Ag"], ans: 2 },
      { q: "How many bones are in the adult human body?", opts: ["196","206","216","226"], ans: 1 },
      { q: "What planet is known as the Red Planet?", opts: ["Venus","Jupiter","Saturn","Mars"], ans: 3 },
      { q: "What gas do plants absorb from the atmosphere?", opts: ["Oxygen","Nitrogen","Carbon dioxide","Hydrogen"], ans: 2 },
      { q: "What is the speed of light (approx)?", opts: ["300,000 km/s","150,000 km/s","500,000 km/s","100,000 km/s"], ans: 0 },
      { q: "What is the powerhouse of the cell?", opts: ["Nucleus","Ribosome","Mitochondria","Golgi body"], ans: 2 },
      { q: "What is the atomic number of Carbon?", opts: ["4","6","8","12"], ans: 1 },
      { q: "Which element has the symbol 'Fe'?", opts: ["Fluorine","Fermium","Iron","Francium"], ans: 2 },
      { q: "What force keeps planets in orbit?", opts: ["Magnetism","Friction","Gravity","Nuclear force"], ans: 2 },
      { q: "What is the boiling point of water at sea level?", opts: ["90°C","95°C","100°C","105°C"], ans: 2 },
    ]
  },
  math: {
    label: '📐 Math', color: '#f59e0b',
    qs: [
      { q: "What is the value of π (pi) to 2 decimal places?", opts: ["3.12","3.14","3.16","3.18"], ans: 1 },
      { q: "What is √144?", opts: ["11","12","13","14"], ans: 1 },
      { q: "If 3x + 7 = 22, what is x?", opts: ["3","4","5","6"], ans: 2 },
      { q: "What is 15% of 200?", opts: ["20","25","30","35"], ans: 2 },
      { q: "What is the sum of angles in a triangle?", opts: ["90°","120°","180°","360°"], ans: 2 },
      { q: "What is 2⁸?", opts: ["128","256","512","64"], ans: 1 },
      { q: "What is the derivative of x²?", opts: ["x","2x","x²","2x²"], ans: 1 },
      { q: "What is 0! (zero factorial)?", opts: ["0","1","Undefined","Infinity"], ans: 1 },
      { q: "How many sides does a dodecagon have?", opts: ["10","11","12","13"], ans: 2 },
      { q: "What is the LCM of 4 and 6?", opts: ["10","12","16","24"], ans: 1 },
    ]
  },
  tech: {
    label: '💻 Tech', color: '#7c3aed',
    qs: [
      { q: "What does CPU stand for?", opts: ["Central Processing Unit","Core Processing Unit","Central Program Utility","Computer Processing Unit"], ans: 0 },
      { q: "Which language is known as the backbone of the web?", opts: ["Python","Java","HTML","C++"], ans: 2 },
      { q: "What does HTTP stand for?", opts: ["Hyper Text Transfer Protocol","High Tech Transfer Protocol","Hyper Transfer Text Protocol","Hyper Text Transit Protocol"], ans: 0 },
      { q: "What is a binary number?", opts: ["Base 8","Base 10","Base 2","Base 16"], ans: 2 },
      { q: "What does RAM stand for?", opts: ["Random Access Memory","Read Access Memory","Run Active Memory","Random Active Module"], ans: 0 },
      { q: "Which company created JavaScript?", opts: ["Microsoft","Google","Netscape","Apple"], ans: 2 },
      { q: "What does 'git' stand for?", opts: ["Global Information Tracker","General Interface Tool","Git is not an acronym","Global Indexing Technology"], ans: 2 },
      { q: "What does CSS stand for?", opts: ["Computer Style Sheets","Creative Style Sheets","Cascading Style Sheets","Colorful Style Sheets"], ans: 2 },
      { q: "What is the time complexity of binary search?", opts: ["O(n)","O(log n)","O(n²)","O(1)"], ans: 1 },
      { q: "Which data structure uses LIFO?", opts: ["Queue","Linked list","Stack","Tree"], ans: 2 },
    ]
  },
  history: {
    label: '🏛️ History', color: '#ec4899',
    qs: [
      { q: "In what year did World War II end?", opts: ["1943","1944","1945","1946"], ans: 2 },
      { q: "Who was the first President of the USA?", opts: ["Abraham Lincoln","Thomas Jefferson","John Adams","George Washington"], ans: 3 },
      { q: "Which ancient wonder was in Alexandria?", opts: ["Hanging Gardens","Colossus of Rhodes","The Lighthouse","Statue of Zeus"], ans: 2 },
      { q: "When did India gain independence?", opts: ["1945","1947","1948","1950"], ans: 1 },
      { q: "Who invented the printing press?", opts: ["Leonardo da Vinci","Johannes Gutenberg","Galileo Galilei","Isaac Newton"], ans: 1 },
      { q: "What was the first country to give women the vote?", opts: ["USA","UK","New Zealand","France"], ans: 2 },
      { q: "In which year did the Berlin Wall fall?", opts: ["1987","1988","1989","1991"], ans: 2 },
      { q: "Who wrote the 'I Have a Dream' speech?", opts: ["Malcolm X","Barack Obama","MLK Jr.","Nelson Mandela"], ans: 2 },
      { q: "Which empire was the largest in history?", opts: ["Roman","British","Mongol","Ottoman"], ans: 2 },
      { q: "In what year was the UN founded?", opts: ["1944","1945","1946","1947"], ans: 1 },
    ]
  }
};

const TIMER_MAX = 15;
let state = {};

// ── BUILD CATEGORY GRID ──
const catGrid = document.getElementById('catGrid');
Object.keys(QUESTIONS).forEach(key => {
  const cat = QUESTIONS[key];
  const div = document.createElement('div');
  div.className = 'cat-card';
  div.dataset.key = key;
  const [icon, name] = cat.label.split(' ');
  div.innerHTML = `<span class="cat-icon">${icon}</span><div class="cat-name">${name}</div>`;
  div.onclick = () => selectCategory(key, div);
  catGrid.appendChild(div);
});

function selectCategory(key, el) {
  document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  state.category = key;
  const btn = document.getElementById('startBtn');
  btn.disabled = false;
  btn.textContent = `Start ${QUESTIONS[key].label} Quiz ⚡`;
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startQuiz() {
  const key = state.category;
  const all = QUESTIONS[key].qs;
  const qs = shuffle(all).slice(0, 10);
  // Store shuffled option order + correct answer mapping
  state.questions = qs.map(q => {
    const indices = shuffle([0,1,2,3]);
    return {
      q: q.q,
      opts: indices.map(i => q.opts[i]),
      ans: indices.indexOf(q.ans)
    };
  });
  state.current = 0;
  state.score = 0;
  state.log = [];
  state.timerVal = TIMER_MAX;
  state.timerInterval = null;

  show('quiz');
  document.getElementById('qTotal').textContent = state.questions.length;
  document.getElementById('catLabel').textContent = QUESTIONS[key].label;
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.current];
  const n = state.current;
  const total = state.questions.length;

  document.getElementById('qIdx').textContent = n + 1;
  document.getElementById('progFill').style.width = ((n / total) * 100) + '%';
  document.getElementById('qNum').textContent = 'QUESTION ' + String(n+1).padStart(2,'0');
  document.getElementById('qText').textContent = q.q;

  const labels = ['A','B','C','D'];
  const container = document.getElementById('answers');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.innerHTML = `<span class="ans-label">${labels[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });

  document.getElementById('feedbackBar').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  clearInterval(state.timerInterval);
  state.timerVal = TIMER_MAX;
  updateTimer(TIMER_MAX);
  state.timerInterval = setInterval(() => {
    state.timerVal--;
    updateTimer(state.timerVal);
    if (state.timerVal <= 0) {
      clearInterval(state.timerInterval);
      timeOut();
    }
  }, 1000);
}

function updateTimer(t) {
  const arc = document.getElementById('timerArc');
  const num = document.getElementById('timerNum');
  const circ = 163.4;
  const offset = circ * (1 - t / TIMER_MAX);
  arc.style.strokeDashoffset = offset;
  arc.style.stroke = t > 8 ? '#10b981' : t > 4 ? '#f59e0b' : '#ef4444';
  num.textContent = t;
}

function timeOut() {
  const q = state.questions[state.current];
  lockAnswers(q.ans, -1);
  showFeedback(false, 'Time\'s up! The answer was: ' + q.opts[q.ans]);
  state.log.push({ q: q.q, correct: false, yourAns: 'Timed out', rightAns: q.opts[q.ans] });
  document.getElementById('nextBtn').style.display = 'block';
}

function selectAnswer(idx) {
  clearInterval(state.timerInterval);
  const q = state.questions[state.current];
  const correct = idx === q.ans;
  if (correct) {
    state.score += 1 + Math.ceil(state.timerVal / 5); // bonus for speed
  }
  document.getElementById('livScore').textContent = `⚡ ${state.score} pts`;
  lockAnswers(q.ans, idx);
  showFeedback(correct, correct ? 'Correct! +' + (1 + Math.ceil(state.timerVal / 5)) + ' pts' : 'Wrong! Correct: ' + q.opts[q.ans]);
  state.log.push({ q: q.q, correct, yourAns: q.opts[idx], rightAns: q.opts[q.ans] });
  document.getElementById('nextBtn').style.display = 'block';
}

function lockAnswers(correctIdx, chosenIdx) {
  const btns = document.querySelectorAll('.ans-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correctIdx) btn.classList.add(chosenIdx === -1 ? 'reveal' : 'correct');
    else if (i === chosenIdx && chosenIdx !== correctIdx) btn.classList.add('wrong');
  });
}

function showFeedback(correct, msg) {
  const bar = document.getElementById('feedbackBar');
  bar.className = 'feedback-bar ' + (correct ? 'correct' : 'wrong');
  bar.innerHTML = (correct ? '✅' : '❌') + ' ' + msg;
  bar.style.display = 'flex';
}

function nextQuestion() {
  state.current++;
  if (state.current >= state.questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  show('results');
  const total = state.questions.length;
  const correct = state.log.filter(l => l.correct).length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('finalScore').textContent = state.score;
  document.getElementById('finalDenom').textContent = `/ ${total * 4}`;

  const verdicts = [
    [0,  39,  '😬 Keep Trying!',   'Every expert was once a beginner.'],
    [40, 59,  '🙂 Not Bad!',        'A bit more practice and you\'ll nail it.'],
    [60, 79,  '😎 Pretty Good!',    'You clearly know your stuff.'],
    [80, 99,  '🔥 Excellent!',      'You\'re on fire! Impressive score.'],
    [100,100, '🏆 Perfect Score!',  'Absolute legend. Flawless!'],
  ];
  const [,, v, vs] = verdicts.find(([a,b]) => pct >= a && pct <= b);
  document.getElementById('verdict').textContent = v;
  document.getElementById('verdictSub').textContent = vs;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-pill">✅ <strong>${correct}</strong> correct</div>
    <div class="stat-pill">❌ <strong>${total - correct}</strong> wrong</div>
    <div class="stat-pill">🎯 <strong>${pct}%</strong> accuracy</div>
    <div class="stat-pill">⚡ <strong>${state.score}</strong> pts</div>
  `;

  const bd = document.getElementById('breakdown');
  bd.innerHTML = state.log.map(l => `
    <div class="bd-item">
      <div class="bd-icon">${l.correct ? '✅' : '❌'}</div>
      <div>
        <div class="bd-q">${l.q}</div>
        <div class="bd-a">${l.correct ? 'Correct' : `You: ${l.yourAns} · Right: ${l.rightAns}`}</div>
      </div>
    </div>
  `).join('');
}

function retryQuiz() { startQuiz(); }

function goHome() {
  clearInterval(state.timerInterval);
  state = {};
  document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected'));
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Pick a Category First';
  document.getElementById('livScore').textContent = '⚡ 0 pts';
  show('home');
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
